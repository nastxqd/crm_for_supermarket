<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Магазин</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-light: #FFE8F5;      /* Светло-розовый */
            --primary: #FF9ACD;             /* Розовый */
            --primary-dark: #E86BA1;        /* Темно-розовый */
            --secondary: #A3E4D7;           /* Мятный */
            --accent: #FFD166;              /* Желтый */
            --text: #5A5A72;                /* Текст */
            --white: #FFFFFF;
        }
        
        * {
            font-family: 'Nunito', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        
        .login-card {
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(168, 115, 153, 0.15);
            overflow: hidden;
            border: none;
        }
        
        .card-header {
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            color: white;
            text-align: center;
            padding: 30px 20px;
            border: none;
        }
        
        .logo {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: white;
        }
        
        .card-title {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        
        .card-subtitle {
            opacity: 0.9;
            font-weight: 300;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .form-control {
            border: 2px solid #F0F0F0;
            border-radius: 12px;
            padding: 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.25rem rgba(255, 154, 205, 0.25);
        }
        
        .input-group-text {
            background-color: var(--primary-light);
            border: 2px solid #F0F0F0;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: var(--primary-dark);
        }
        
        .form-control.with-icon {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }
        
        .btn-login {
            background: linear-gradient(to right, var(--primary), var(--primary-dark));
            border: none;
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(232, 107, 161, 0.3);
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #aaa;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #eee;
        }
        
        .divider span {
            padding: 0 15px;
        }
        
        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        
        .social-btn:hover {
            transform: translateY(-3px);
        }
        
        .facebook {
            background: linear-gradient(45deg, #3b5998, #8b9dc3);
        }
        
        .google {
            background: linear-gradient(45deg, #DB4437, #F4B400);
        }
        
        .github {
            background: linear-gradient(45deg, #333, #6e5494);
        }
        
        .links {
            text-align: center;
            margin-top: 20px;
        }
        
        .links a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        
        .links a:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        
        .footer-text {
            text-align: center;
            margin-top: 30px;
            color: var(--text);
            font-size: 0.9rem;
        }
        
        .checkbox-custom {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .checkbox-custom input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .checkbox-custom input:checked {
            accent-color: var(--primary);
        }
        
        /* Анимация для карточки */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card {
            animation: fadeInUp 0.6s ease-out;
        }
        
        /* Адаптивность */
        @media (max-width: 576px) {
            .login-container {
                padding: 0 15px;
            }
            
            .card-body {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card card">
            <div class="card-header">
                <div class="logo">
                    <i class="fas fa-flower"></i>
                </div>
                <h2 class="card-title">Добро пожаловать!</h2>
                <p class="card-subtitle">Войдите в ваш аккаунт</p>
            </div>
            
            <div class="card-body">
                <!-- Форма входа -->
                <form id="loginForm" method="POST" action="/login">
                    <div class="mb-4">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="text" class="form-control with-icon" id="username" 
                                   placeholder="Имя пользователя или email" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-lock"></i>
                            </span>
                            <input type="password" class="form-control with-icon" id="password" 
                                   placeholder="Пароль" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <label class="checkbox-custom">
                            <input type="checkbox" id="remember">
                            <span>Запомнить меня</span>
                        </label>
                        <a href="#" class="forgot-password">Забыли пароль?</a>
                    </div>
                    <a href="/login"></a>
                    <button type="submit" class="btn btn-login">
                        <i class="fas fa-sign-in-alt me-2"></i>Войти
                    </button>
                </form>
                
            </div>
        </div>
        
        <div class="footer-text">
            <p>© 2024 Магазин Цветов. Все права защищены.</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Кастомный JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Переключение видимости пароля
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const eyeIcon = togglePassword.querySelector('i');
            
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Меняем иконку
                if (type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                    togglePassword.setAttribute('title', 'Скрыть пароль');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                    togglePassword.setAttribute('title', 'Показать пароль');
                }
            });
            
        });
    </script>
</body>
</html>
